app:
  name: snablr
  log_level: info
  banner_path: internal/ui/assets/snablr.txt

scan:
  targets: []
  targets_file: ""
  profile: default
  username: ""
  password: ""
  share: []
  exclude_share: []
  path: []
  exclude_path: []
  max_depth: 0
  worker_count: 0
  max_file_size: 10485760
  no_ldap: false
  domain: ""
  dc: ""
  base_dn: ""
  discover_dfs: false
  prioritize_ad_shares: true
  only_ad_shares: false
  max_scan_time: ""
  checkpoint_file: ""
  resume: false
  skip_reachability_check: false
  reachability_timeout_seconds: 3

archives:
  enabled: true
  auto_zip_max_size: 10485760
  allow_large_zips: false
  max_zip_size: 10485760
  auto_tar_max_size: 10485760
  allow_large_tars: false
  max_tar_size: 10485760
  max_members: 64
  max_member_bytes: 524288
  max_total_uncompressed_bytes: 4194304
  inspect_extensionless_text: true

sqlite:
  enabled: true
  auto_db_max_size: 5242880
  allow_large_dbs: false
  max_db_size: 5242880
  max_tables: 8
  max_rows_per_table: 5
  max_cell_bytes: 256
  max_total_bytes: 16384
  max_interesting_columns: 4

suppression:
  file: ""
  sample_limit: 10
  rules: []

rules:
  rules_directory: ""
  fail_on_invalid: false

output:
  output_format: console
  json_out: results.json
  html_out: report.html
  csv_out: ""
  md_out: ""
  creds_out: ""
  pretty: true
