# Default defensive filename rules.
# Safe defaults: focused filename indicators that usually justify review on their own.
# Noisy but useful: broader business/archive terms are disabled by default and should be narrowed for local naming conventions.
# Organization-specific tuning candidates: add local project names and department-specific keywords in configs/rules/custom/.
version: 1
name: defensive-filenames
description: Defensive filename rules for credential, backup, business-sensitive, and deployment review.
rules:
  # Safe default: intended for filenames that explicitly suggest secrets or access material.
  - id: filename.credentials_and_secrets_keywords
    name: Credentials And Secrets Keywords
    description: Detect filenames that strongly suggest stored credentials, secrets, VPN material, or administrative access data.
    type: filename
    pattern: '(?i)(credential|creds|secret|secrets|password|passwd|pwd(?:[-_ ]?list)?|(?:^|[^a-z0-9])pw(?:[^a-z0-9]|$)|login[-_ ]?(?:details|info)|account[-_ ]?(?:details|credentials)|token|apikey|api-key|private[-_]?key|vpn)'
    case_sensitive: false
    severity: high
    tags: [credentials, filenames, review]
    category: credentials
    enabled: true
    include_paths: []
    exclude_paths: [node_modules, vendor, cache, temp, tmp]
    file_extensions: []
    max_file_size: 0
    action: report

  # Safe default: common high-value application config names.
  - id: filename.sensitive_config_names
    name: Sensitive Config Names
    description: Detect common config filenames that frequently contain environment settings or embedded secrets.
    type: filename
    pattern: '(?i)^(web\.config|appsettings(\.[^.]+)?\.json|settings\.(json|py|yaml|yml)|config\.(php|inc|bak)|\.env(\..+)?)$'
    case_sensitive: false
    severity: high
    tags: [configuration, filenames, remediation]
    category: configuration
    enabled: true
    include_paths: []
    exclude_paths: [node_modules, vendor, cache, temp, tmp]
    file_extensions: []
    max_file_size: 0
    action: prioritize

  # Noisy but useful: archive and export naming is common in ordinary file shares.
  # Tune with include_paths and file_extensions before enabling broadly.
  - id: filename.backup_export_archive_keywords
    name: Backup Export Archive Keywords
    description: Detect filenames suggesting backups, exports, dumps, or archival copies that may require secure handling review.
    type: filename
    pattern: '(?i)(backup|export|archive|dump|snapshot|migration|legacy|copy)'
    case_sensitive: false
    severity: medium
    tags: [backups, exports, filenames]
    category: archives
    enabled: false
    include_paths: []
    exclude_paths: [node_modules, vendor, cache, temp, tmp]
    file_extensions: [.7z, .bak, .csv, .db, .dump, .gz, .json, .rar, .sql, .tar, .tgz, .txt, .xml, .zip]
    max_file_size: 0
    action: report

  # Safe default: password-manager artifacts are usually high-value review items.
  - id: filename.password_manager_artifacts
    name: Password Manager Artifacts
    description: Detect filenames associated with password managers or local credential vaults.
    type: filename
    pattern: '(?i)(keepass|vault|1password|bitwarden|lastpass|passwordsafe|kdbx?)'
    case_sensitive: false
    severity: high
    tags: [password-manager, credentials, filenames]
    category: password-manager
    enabled: true
    include_paths: []
    exclude_paths: [cache, temp, tmp]
    file_extensions: []
    max_file_size: 0
    action: prioritize

  # Safe default: exact secret-store artifact names are usually direct credential exposure review items.
  - id: filename.secret_store_artifacts
    name: Secret Store Artifacts
    description: Detect exact high-value secret-store artifact filenames such as AD database or local password-hash stores.
    type: filename
    pattern: '(?i)^(ntds\.dit|shadow|sam)$'
    case_sensitive: false
    severity: critical
    confidence: high
    explanation: This filename is associated with an operating-system or directory-service secret store rather than a generic config file.
    remediation: Restrict access immediately, verify whether the artifact belongs on the share, and rotate affected credentials if exposure is confirmed.
    tags: [credentials, secret-store, filenames, remediation]
    category: credentials
    enabled: true
    include_paths: []
    exclude_paths: [cache, temp, tmp]
    file_extensions: []
    max_file_size: 0
    action: prioritize

  # Safe default: SYSTEM and SECURITY hives are only treated as high-value findings in known Windows hive locations.
  - id: filename.windows_hive_artifacts
    name: Windows Hive Artifacts
    description: Detect exact SYSTEM and SECURITY registry hive filenames when they appear in known Windows credential-store locations.
    type: filename
    pattern: '(?i)^(system|security)$'
    case_sensitive: false
    severity: critical
    confidence: high
    explanation: This filename is associated with a Windows registry hive used for local credential extraction when found in standard hive-storage paths.
    remediation: Restrict access immediately, verify why the hive copy exists on the share, and rotate affected credentials if exposure is confirmed.
    tags: [credentials, secret-store, windows, filenames, remediation]
    category: credentials
    enabled: true
    include_paths: [windows/system32/config, windows/repair, regback]
    exclude_paths: [cache, temp, tmp]
    file_extensions: []
    max_file_size: 0
    action: prioritize

  # Safe default: copied AD database files are high-value credential-store artifacts even outside standard system paths.
  - id: filename.ad_database_backup_artifacts
    name: AD Database Backup Artifacts
    description: Detect exact backup or copy filenames of the AD database artifact.
    type: filename
    pattern: '(?i)^(ntds\.dit\.(bak|old))$'
    case_sensitive: false
    severity: critical
    confidence: high
    explanation: This filename is an exact backup or copy variant of the Active Directory database artifact.
    remediation: Restrict access immediately, verify why the backup exists on the share, and rotate affected credentials if exposure is confirmed.
    tags: [credentials, secret-store, active-directory, filenames, remediation]
    category: credentials
    enabled: true
    include_paths: []
    exclude_paths: [cache, temp, tmp]
    file_extensions: []
    max_file_size: 0
    action: prioritize

  # Safe default: copied registry hives are only treated as high-value findings in known Windows hive or backup locations.
  - id: filename.windows_hive_backup_artifacts
    name: Windows Hive Backup Artifacts
    description: Detect exact backup or copy filenames of Windows credential-relevant registry hives in known hive or backup locations.
    type: filename
    pattern: '(?i)^(sam|system|security)\.(bak|old)$'
    case_sensitive: false
    severity: critical
    confidence: high
    explanation: This filename is an exact backup or copy variant of a Windows registry hive used for local credential extraction when found in standard hive or backup paths.
    remediation: Restrict access immediately, verify why the hive backup exists on the share, and rotate affected credentials if exposure is confirmed.
    tags: [credentials, secret-store, windows, filenames, remediation]
    category: credentials
    enabled: true
    include_paths: [windows/system32/config, windows/repair, regback, windowsimagebackup, system volume information]
    exclude_paths: [cache, temp, tmp]
    file_extensions: []
    max_file_size: 0
    action: prioritize

  # Organization-specific tuning candidate: broad department keywords vary significantly across environments.
  # Prefer a custom rule file with local department or export names instead of enabling this globally.
  - id: filename.business_sensitive_keywords
    name: Business Sensitive Keywords
    description: Detect filenames suggesting payroll, finance, HR, contracts, customer exports, or other business-sensitive material.
    type: filename
    pattern: '(?i)(payroll|finance|invoice|contract|employee|personnel|hr|tax|customer|client|accounts?[-_ ]?(payable|receivable)?)'
    case_sensitive: false
    severity: high
    tags: [business-data, pii, filenames]
    category: business-data
    enabled: false
    include_paths: []
    exclude_paths: [cache, temp, tmp]
    file_extensions: [.csv, .docx, .pdf, .txt, .tsv, .xls, .xlsx]
    max_file_size: 0
    action: report

  # Safe default: unattended deployment and bootstrap naming is usually actionable.
  - id: filename.deployment_answer_files
    name: Deployment Answer Files
    description: Detect unattended installer, answer file, and bootstrap naming indicators for review.
    type: filename
    pattern: '(?i)^(unattend|autounattend|sysprep|answerfile|bootstrap|deployment).*$'
    case_sensitive: false
    severity: high
    tags: [deployment, windows, filenames]
    category: deployment
    enabled: true
    include_paths: []
    exclude_paths: [cache, temp, tmp]
    file_extensions: []
    max_file_size: 0
    action: prioritize

  # Safe default: Group Policy and policy-adjacent review files.
  - id: filename.ad_policy_review_files
    name: AD Policy Review Files
    description: Detect administrative policy and Group Policy Preference filenames that deserve hygiene review.
    type: filename
    pattern: '(?i)^(groups\.xml|scheduledtasks\.xml|services\.xml|drives\.xml|registry\.xml|gpttmpl\.inf|scripts\.ini)$'
    case_sensitive: false
    severity: high
    tags: [active-directory, policy, review]
    category: active-directory
    enabled: true
    include_paths: []
    exclude_paths: [cache, temp, tmp]
    file_extensions: []
    max_file_size: 0
    action: prioritize
