version: 1
name: example-custom-rules
description: Example organization-specific rules for local tuning.
rules:
  - id: filename.example_finance_keyword
    name: Example Finance Keyword
    description: Flags filenames containing a local finance keyword for review.
    type: filename
    pattern: '(?i)(ledger|quarterly-finance)'
    case_sensitive: false
    severity: medium
    confidence: medium
    explanation: This filename pattern may indicate internal financial reporting material.
    remediation: Review whether these files belong on a broad-access share and tighten access if needed.
    tags: [example, finance, custom]
    category: business-sensitive
    enabled: true
    include_paths: []
    exclude_paths: []
    file_extensions: [.xlsx, .csv, .txt]
    max_file_size: 0
    action: report
